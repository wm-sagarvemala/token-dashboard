<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Token Usage (ACN OnBoarding team)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255, 255, 255, 0.10);
    --series: #3987e5;
    --series-soft: rgba(57, 135, 229, 0.22);
    --danger: #e66767;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 48px; }

  header h1 { margin: 0; font-size: 1.35rem; font-weight: 650; }
  header .sub { margin: 4px 0 0; color: var(--ink-2); font-size: 0.9rem; }
  header .sub3 { margin: 2px 0 0; color: var(--muted); font-size: 0.82rem; }

  .toolbar { margin: 18px 0 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .segmented { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .segmented button {
    appearance: none;
    background: transparent;
    color: var(--ink-2);
    border: 0;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    min-height: 38px;
  }
  .segmented button.active { background: var(--series); color: #fff; font-weight: 600; }
  .segmented button:disabled { color: var(--baseline); cursor: not-allowed; }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .card .k { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .v { font-size: 1.45rem; font-weight: 650; margin-top: 2px; }
  .card .s { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .panel h2 { margin: 0 0 10px; font-size: 0.85rem; font-weight: 600; color: var(--ink-2); }
  .chart-box { position: relative; height: 260px; }

  .table-wrap { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  td { font-size: 0.88rem; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .share-cell { min-width: 140px; }
  .share-bar { background: var(--baseline); border-radius: 4px; height: 8px; overflow: hidden; }
  .share-bar > div { background: var(--series); height: 100%; border-radius: 4px; }
  .share-pct { color: var(--ink-2); font-size: 0.78rem; margin-left: 8px; font-variant-numeric: tabular-nums; }
  .share-flex { display: flex; align-items: center; }
  .share-flex .share-bar { flex: 1; }
  a.logs { color: var(--series); text-decoration: none; }
  a.logs:hover { text-decoration: underline; }
  .dash { color: var(--baseline); }

  .empty, #error {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    color: var(--ink-2);
    margin-top: 10px;
  }
  #error { border-color: var(--danger); color: var(--danger); display: none; }

  @media (max-width: 800px) {
    .charts { grid-template-columns: 1fr; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    .card .v { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Token Usage (ACN OnBoarding team)</h1>
    <p class="sub" id="subtitle">Loading…</p>
    <p class="sub3">1 USD = 20 Credits in Platform · usage is reported as cost ($).</p>
  </header>

  <div id="error" role="alert"></div>

  <div id="app" style="display:none">
    <div class="toolbar">
      <div class="segmented" role="tablist" aria-label="Usage window">
        <button type="button" data-view="last30days" role="tab">Last 30 days</button>
        <button type="button" data-view="last24hours" role="tab">Last 24 hours</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="k">Total cost</div>
        <div class="v" id="cardCost">–</div>
        <div class="s" id="cardCredits"></div>
      </div>
      <div class="card"><div class="k">Users</div><div class="v" id="cardUsers">–</div></div>
      <div class="card"><div class="k">Traces</div><div class="v" id="cardTraces">–</div></div>
      <div class="card"><div class="k">Avg cost / trace</div><div class="v" id="cardAvg">–</div></div>
    </div>

    <div class="charts">
      <div class="panel">
        <h2 id="barTitle">Cost per user</h2>
        <div class="chart-box" id="barBox"><canvas id="barCanvas"></canvas></div>
      </div>
      <div class="panel">
        <h2>Total cost per day (trend)</h2>
        <div class="chart-box"><canvas id="lineCanvas"></canvas></div>
      </div>
    </div>

    <div class="table-wrap panel" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th class="num">Cost</th>
            <th class="num">Credits</th>
            <th class="num">Traces</th>
            <th class="num">Cost/trace</th>
            <th class="share-cell">Share</th>
            <th>Logs</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty" id="emptyState" style="display:none">No usage recorded for this window.</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var CREDITS_PER_USD = 20;
  var VIEWS = [
    { key: 'last30days', label: 'Last 30 days' },
    { key: 'last24hours', label: 'Last 24 hours' }
  ];

  var data = { snapshots: {}, daily: {} };
  var currentView = null;
  var barChart = null;
  var lineChart = null;

  var css = getComputedStyle(document.documentElement);
  var COLORS = {
    series: css.getPropertyValue('--series').trim(),
    seriesSoft: css.getPropertyValue('--series-soft').trim(),
    grid: css.getPropertyValue('--grid').trim(),
    muted: css.getPropertyValue('--muted').trim()
  };

  function $(id) { return document.getElementById(id); }

  function fmtCost(v) {
    return '$' + v.toFixed(v < 10 ? 3 : 2);
  }

  function fmtCredits(usd) {
    var c = usd * CREDITS_PER_USD;
    return (c % 1 === 0 ? c.toFixed(0) : c.toFixed(1)) + ' credits';
  }

  function fmtDateTime(iso) {
    var d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString(undefined, {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }

  function localPart(email) {
    return String(email).split('@')[0];
  }

  function viewLabel(key) {
    for (var i = 0; i < VIEWS.length; i++) {
      if (VIEWS[i].key === key) return VIEWS[i].label;
    }
    return key;
  }

  function showError(msg) {
    var el = $('error');
    el.textContent = msg;
    el.style.display = 'block';
    $('subtitle').textContent = 'Failed to load data.';
  }

  function baseScaleOpts() {
    return {
      grid: { color: COLORS.grid, drawTicks: false },
      border: { color: COLORS.grid },
      ticks: { color: COLORS.muted, font: { size: 11 } }
    };
  }

  function renderBarChart(users) {
    if (barChart) { barChart.destroy(); barChart = null; }
    $('barBox').style.height = Math.max(220, 40 * users.length + 60) + 'px';
    barChart = new Chart($('barCanvas'), {
      type: 'bar',
      data: {
        labels: users.map(function (u) { return localPart(u.email); }),
        datasets: [{
          data: users.map(function (u) { return u.cost; }),
          backgroundColor: COLORS.series,
          borderRadius: 4,
          barThickness: 18
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var u = users[ctx.dataIndex];
                return fmtCost(u.cost) + ' · ' + fmtCredits(u.cost) + ' · ' + u.traces + ' traces';
              }
            }
          }
        },
        scales: {
          // no fixed min/max anywhere — axes re-fit whatever data is loaded
          x: Object.assign(baseScaleOpts(), {
            beginAtZero: true,
            grace: '5%',
            ticks: {
              color: COLORS.muted, font: { size: 11 },
              callback: function (v) { return '$' + Number(v).toFixed(2); }
            }
          }),
          y: Object.assign(baseScaleOpts(), { grid: { display: false } })
        }
      }
    });
  }

  function renderLineChart() {
    if (lineChart) { lineChart.destroy(); lineChart = null; }
    var dates = Object.keys(data.daily).sort();
    lineChart = new Chart($('lineCanvas'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: dates.map(function (d) { return data.daily[d].cost; }),
          borderColor: COLORS.series,
          backgroundColor: COLORS.seriesSoft,
          fill: true,
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: COLORS.series,
          tension: 0.25
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var day = data.daily[dates[ctx.dataIndex]];
                return fmtCost(ctx.parsed.y) + ' · ' + day.traces + ' traces · ' + day.users + ' users';
              }
            }
          }
        },
        scales: {
          x: baseScaleOpts(),
          y: Object.assign(baseScaleOpts(), {
            beginAtZero: true,
            grace: '5%',
            ticks: {
              color: COLORS.muted, font: { size: 11 },
              callback: function (v) { return '$' + Number(v).toFixed(2); }
            }
          })
        }
      }
    });
  }

  function renderTable(users, total) {
    var body = $('tableBody');
    body.textContent = '';
    users.forEach(function (u) {
      var tr = document.createElement('tr');

      var tdUser = document.createElement('td');
      tdUser.textContent = u.email;
      tr.appendChild(tdUser);

      var tdCost = document.createElement('td');
      tdCost.className = 'num';
      tdCost.textContent = fmtCost(u.cost);
      tr.appendChild(tdCost);

      var tdCredits = document.createElement('td');
      tdCredits.className = 'num';
      tdCredits.textContent = fmtCredits(u.cost).replace(' credits', '');
      tr.appendChild(tdCredits);

      var tdTraces = document.createElement('td');
      tdTraces.className = 'num';
      tdTraces.textContent = u.traces;
      tr.appendChild(tdTraces);

      var tdAvg = document.createElement('td');
      tdAvg.className = 'num';
      tdAvg.textContent = u.traces > 0 ? fmtCost(u.cost / u.traces) : '—';
      tr.appendChild(tdAvg);

      var tdShare = document.createElement('td');
      tdShare.className = 'share-cell';
      var pct = total > 0 ? (u.cost / total) * 100 : 0;
      var flex = document.createElement('div');
      flex.className = 'share-flex';
      var bar = document.createElement('div');
      bar.className = 'share-bar';
      var fill = document.createElement('div');
      fill.style.width = pct.toFixed(1) + '%';
      bar.appendChild(fill);
      var pctLabel = document.createElement('span');
      pctLabel.className = 'share-pct';
      pctLabel.textContent = pct.toFixed(1) + '%';
      flex.appendChild(bar);
      flex.appendChild(pctLabel);
      tdShare.appendChild(flex);
      tr.appendChild(tdShare);

      var tdLogs = document.createElement('td');
      if (u.url) {
        var a = document.createElement('a');
        a.className = 'logs';
        a.href = u.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'logs ↗';
        tdLogs.appendChild(a);
      } else {
        var dash = document.createElement('span');
        dash.className = 'dash';
        dash.textContent = '—';
        tdLogs.appendChild(dash);
      }
      tr.appendChild(tdLogs);

      body.appendChild(tr);
    });
  }

  function renderView(key) {
    currentView = key;
    var snap = data.snapshots[key];

    var buttons = document.querySelectorAll('.segmented button');
    buttons.forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-view') === key);
      b.setAttribute('aria-selected', b.getAttribute('data-view') === key ? 'true' : 'false');
    });

    $('subtitle').textContent = 'Last updated: ' + fmtDateTime(snap.updated_at) +
      ' (' + viewLabel(key) + ')';

    var users = snap.users.slice().sort(function (a, b) { return b.cost - a.cost; });
    var total = users.reduce(function (s, u) { return s + u.cost; }, 0);
    var traces = users.reduce(function (s, u) { return s + u.traces; }, 0);

    $('cardCost').textContent = fmtCost(total);
    $('cardCredits').textContent = '≈ ' + fmtCredits(total);
    $('cardUsers').textContent = String(users.length);
    $('cardTraces').textContent = String(traces);
    $('cardAvg').textContent = traces > 0 ? fmtCost(total / traces) : '—';
    $('barTitle').textContent = 'Cost per user — ' + viewLabel(key);

    var hasUsers = users.length > 0;
    $('tableWrap').style.display = hasUsers ? '' : 'none';
    $('emptyState').style.display = hasUsers ? 'none' : '';

    renderBarChart(users);
    renderLineChart();
    if (hasUsers) renderTable(users, total);
  }

  function init(loaded) {
    data.snapshots = loaded.snapshots || {};
    data.daily = loaded.daily || {};

    var available = VIEWS.filter(function (v) { return data.snapshots[v.key]; });
    if (available.length === 0) {
      showError('history.json contains no snapshots yet. Run update.py to record one.');
      return;
    }

    var buttons = document.querySelectorAll('.segmented button');
    buttons.forEach(function (b) {
      var key = b.getAttribute('data-view');
      if (!data.snapshots[key]) {
        b.disabled = true;
        b.title = 'No data yet';
        return;
      }
      b.addEventListener('click', function () { renderView(key); });
    });

    // default to the most recently updated snapshot; ties prefer the daily view
    var initial = available.slice().sort(function (a, b) {
      var cmp = String(data.snapshots[b.key].updated_at).localeCompare(String(data.snapshots[a.key].updated_at));
      if (cmp !== 0) return cmp;
      return (a.key === 'last24hours' ? -1 : 1);
    })[0].key;

    $('app').style.display = '';
    renderView(initial);
  }

  fetch('data/history.json?t=' + Date.now())
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(init)
    .catch(function (err) {
      showError('Could not load data/history.json (' + err.message + '). ' +
        'If you opened this file directly (file://), serve it instead: python3 -m http.server');
    });
})();
</script>
</body>
</html>
